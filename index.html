<!DOCTYPE html>

<body>
    <div class="container">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div id="screenContainer"></div>
    </div>

    <!-- DB Status Toast -->
    <div id="pg-db-status"></div>

    <script>
        // ============================================================
        //  GLOBAL STATE
        // ============================================================
        let currentPhase = 'onboarding';
        let currentStep = 0;
        let userData = {};
        let selectedAnswer = null;
        let allowRedo = true;

        // Assessment state
        let currentQuestion = 0;
        let assessmentScore = 0;
        let block1Correct = 0;
        let wrongAnswers = [];
        let assessmentAnswers = []; // ✅ FIX: tracks ALL answers for DB (was missing)
        let isEditingField = false;

        // Learning preferences state
        let currentLearningStep = 0;

        // ============================================================
        //  GOOGLE SHEETS CONFIG
        // ============================================================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz81pj6ns4lOpyQ6PMDy0_S_u4Ehezk1FZt3roNYFqjphm9hx2qFaHADvs8uIxWCca0/exec';

        // ============================================================
        //  STATIC DATA
        // ============================================================
        const breedStats = {
            'SRD / Vira-lata': { percentage: 38.17, traits: 'Únicos, resilientes, geralmente mais saudáveis' },
            'Shih Tzu': { percentage: 9.59, traits: 'Amigável, carinhoso, ótimo para apartamento' },
            'Golden Retriever': { percentage: 4.29, traits: 'Leal, inteligente, excelente cão de família' },
            'Labrador': { percentage: 3.34, traits: 'Energético, amigável, fácil de treinar' },
            'Border Collie': { percentage: 2.58, traits: 'Altamente inteligente, ativo, precisa de estímulo mental' },
            'Pit Bull': { percentage: 2.79, traits: 'Forte, leal, gigantes gentis frequentemente mal compreendidos' }
        };

        const problemStats = {
            'Xixi/cocô fora do lugar': { percentage: 51.24, insight: 'O desafio #1 em lares brasileiros (apartamentos!)' },
            'Roer/morder/destruir coisas': { percentage: 38.43, insight: 'Muito comum, geralmente ligado a tédio ou ansiedade' },
            'Pular nas pessoas': { percentage: 35.95, insight: 'Frequentemente um sinal de excitação e falta de limites' },
            'Puxar muito na guia': { percentage: 33.95, insight: 'Um dos problemas mais comuns no passeio' },
            'Ansiedade de separação': { percentage: 32.81, insight: 'Especialmente comum em ambientes urbanos' },
            'Latir excessivamente': { percentage: 26.68, insight: 'Pode ser territorial, ansiedade ou comunicação' },
            'Agressividade': { percentage: 18.83, insight: 'Requer avaliação profissional e treinamento cuidadoso' }

        ];

        // ============================================================
        //  INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            showOnboardingStep();
        });

        // ============================================================
        //  ONBOARDING
        // ============================================================
        function showOnboardingStep() {
            const step = onboardingSteps[currentStep];
            const container = document.getElementById('screenContainer');
            const progress = ((currentStep + 1) / onboardingSteps.length) * 40;
            document.getElementById('progressFill').style.width = progress + '%';

            let question = step.question;
            let subtitle = step.subtitle;
            Object.keys(userData).forEach(key => {
                question = question.replace(`{${key}}`, userData[key]);
                subtitle = subtitle.replace(`{${key}}`, userData[key]);
            });

            let html = `<div class="screen active"><div class="avatar">🐶</div><h1 class="question">${question}</h1><p class="subtitle">${subtitle}</p><div class="input-container">`;

            if (step.type === 'text') {
                html += `<input type="text" class="text-input" id="textInput" placeholder="${step.placeholder}" ${step.optional ? '' : 'required'}><button class="next-btn" onclick="submitOnboardingAnswer()">${step.optional ? 'Pular / Próximo' : 'Próximo'} →</button>`;
            } else {
                html += `<div class="button-grid">`;
                step.options.forEach(option => {
                    html += `<button class="option-btn" onclick="selectOnboardingOption('${option.value}')"><div class="icon">${option.icon}</div><div class="label">${option.label}</div>${option.description ? `<div class="description">${option.description}</div>` : ''}</button>`;
                });
                html += `</div>`;
                if (step.allowText) {
                    html += `<div style="margin-top:24px;text-align:center;color:#6b7280;">ou</div><input type="text" class="text-input" id="textInput" placeholder="Digite outra raça..." style="margin-top:16px;"><button class="next-btn" onclick="submitOnboardingAnswer()" style="margin-top:16px;">Próximo →</button>`;
                }
            }
            html += `</div></div>`;
            container.innerHTML = html;

            if (step.type === 'text') {
                setTimeout(() => {
                    const input = document.getElementById('textInput');
                    if (input) { input.focus(); input.addEventListener('keypress', (e) => { if (e.key === 'Enter') submitOnboardingAnswer(); }); }
                }, 100);
            }
        }

        function selectOnboardingOption(value) {
            userData[onboardingSteps[currentStep].id] = value;
            showOnboardingInsight(value);
        }

        function submitOnboardingAnswer() {
            const step = onboardingSteps[currentStep];
            const input = document.getElementById('textInput');
            if (!input) return;
            const value = cleanInput(input.value.trim(), step.id);
            if (!value && !step.optional) return;
            userData[step.id] = value || '(Pulado)';
            showOnboardingInsight(value || '(Pulado)');
        }

        function showOnboardingInsight(value) {
            const step = onboardingSteps[currentStep];
            const insight = step.insight(value);
            const container = document.getElementById('screenContainer');
            let html = `<div class="insight-screen active"><div class="insight-card"><div class="insight-icon">${insight.icon}</div><h2 class="insight-title">${insight.title}</h2><p class="insight-text">${insight.text}</p>`;
            if (insight.stats) insight.stats.forEach(stat => { html += `<div class="insight-stat">${stat.value} ${stat.label}</div>`; });
            if (insight.tip) html += `<div class="insight-tip"><strong>💡 Você sabia?</strong>${insight.tip}</div>`;
            html += `</div><button class="continue-btn" onclick="nextOnboardingStep()">Continuar →</button></div>`;
            container.innerHTML = html;
        }

        function nextOnboardingStep() {
            if (isEditingField) { isEditingField = false; showOnboardingSummary(); return; }
            currentStep++;
            if (currentStep >= onboardingSteps.length) showOnboardingSummary();
            else showOnboardingStep();
        }

        function showOnboardingSummary() {
            const container = document.getElementById('screenContainer');
            document.getElementById('progressFill').style.width = '40%';
            let html = `
                <div class="screen active">
                    <div class="avatar">🎉</div>
                    <h1 class="question">Perfeito, ${userData.ownerName}!</h1>
                    <p class="subtitle">Revise suas informações antes de começar o nivelamento</p>
                    <div class="summary-section">
                        <h3>👤 Tutor</h3>
                        <div class="summary-item"><div style="flex:1;"><span class="summary-label">Nome:</span> <span class="summary-value">${userData.ownerName}</span></div><button class="edit-btn" onclick="editOnboardingField('ownerName')">✏️ Editar</button></div>
                    </div>
                    <div class="summary-section">
                        <h3>🐕 Informações do(a) ${userData.dogName}</h3>
                        <div class="summary-item"><div style="flex:1;"><span class="summary-label">Nome do Cão:</span> <span class="summary-value">${userData.dogName}</span></div><button class="edit-btn" onclick="editOnboardingField('dogName')">✏️ Editar</button></div>
                        <div class="summary-item"><div style="flex:1;"><span class="summary-label">Raça:</span> <span class="summary-value">${userData.breed}</span></div><button class="edit-btn" onclick="editOnboardingField('breed')">✏️ Editar</button></div>
                        <div class="summary-item"><div style="flex:1;"><span class="summary-label">Idade:</span> <span class="summary-value">${userData.age}</span></div><button class="edit-btn" onclick="editOnboardingField('age')">✏️ Editar</button></div>
                        <div class="summary-item"><div style="flex:1;"><span class="summary-label">Desafio Principal:</span> <span class="summary-value">${userData.problem}</span></div><button class="edit-btn" onclick="editOnboardingField('problem')">✏️ Editar</button></div>
                        ${userData.details && userData.details !== '(Pulado)' ? `<div class="summary-item"><div style="flex:1;"><span class="summary-label">Detalhes:</span> <span class="summary-value">${userData.details}</span></div><button class="edit-btn" onclick="editOnboardingField('details')">✏️ Editar</button></div>` : ''}
                    </div>
                    <div style="text-align:center;margin:32px 0;">
                        <button class="redo-btn-orange" onclick="redoOnboarding()" ${!allowRedo ? 'disabled' : ''}>🔄 Refazer todo o cadastro</button>
                        ${!allowRedo ? '<p style="text-align:center;color:#9ca3af;font-size:13px;margin-top:12px;">(Você já refez o cadastro completo uma vez)</p>' : ''}
                    </div>
                    <div class="info-card">
                        <p style="color:#6b7280;text-align:center;line-height:1.6;">
                            <strong style="color:#111827;display:block;margin-bottom:12px;font-size:18px;">🎓 Próxima Etapa: Nivelamento</strong>
                            Avaliação de 15 perguntas em 2 blocos para determinar seu nível REAL de conhecimento.
                        </p>
                    </div>
                    <div style="text-align:center;margin-top:32px;">
                        <button class="next-btn" onclick="startAssessment()">Começar Nivelamento 🎯</button>
                    </div>
                </div>`;
            container.innerHTML = html;
        }

        function editOnboardingField(fieldId) {
            isEditingField = true;
            const stepIndex = onboardingSteps.findIndex(step => step.id === fieldId);
            if (stepIndex === -1) return;
            currentStep = stepIndex;
            showOnboardingStep();
        }

        function cleanInput(text, field) {
            let cleaned = text.trim();
            if (field === 'email') return cleaned.toLowerCase();
            const prefixes = ["é o ", "é a ", "é ", "o nome é ", "a ", "o ", "meu nome é ", "eu sou ", "meu cachorro é ", "meu cão é ", "um ", "uma "];
            const lowerCleaned = cleaned.toLowerCase();
            for (const prefix of prefixes) {
                if (lowerCleaned.startsWith(prefix)) { cleaned = cleaned.substring(prefix.length).trim(); break; }
            }
            if ((field === 'dogName' || field === 'ownerName') && cleaned.length > 0)
                cleaned = cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
            if (field === 'breed' && cleaned.length > 0)
                cleaned = cleaned.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
            return cleaned;
        }

        // ============================================================
        //  ASSESSMENT
        // ============================================================
        function redoOnboarding() {
            allowRedo = false;
            currentStep = 0;
            userData = {};
            selectedAnswer = null;
            showOnboardingStep();
        }

        function startAssessment() {
            currentPhase = 'assessment';
            currentQuestion = 0;
            assessmentScore = 0;
            block1Correct = 0;
            wrongAnswers = [];
            assessmentAnswers = []; // ✅ FIX: reset answer tracker
            showAssessmentIntro();
        }

        function showAssessmentIntro() {
            document.getElementById('progressFill').style.width = '40%';
            document.getElementById('screenContainer').innerHTML = `
                <div class="screen active" style="text-align:center;">
                    <div class="avatar">🎓</div>
                    <h1 class="title">Avaliação de Conhecimento</h1>
                    <p class="subtitle">Vamos avaliar seu nível de conhecimento sobre comportamento canino.</p>
                    <div class="info-card">
                        <div class="info-item"><div class="info-icon">❓</div><div class="info-text"><strong>15 Perguntas em 2 Blocos</strong><span>Bloco 1: 10 perguntas • Pausa • Bloco 2: 5 perguntas</span></div></div>
                        <div class="info-item"><div class="info-icon">⏱️</div><div class="info-text"><strong>10-15 Minutos</strong><span>Sem pressa! Haverá uma pausa no meio</span></div></div>

                    <button class="start-btn" onclick="showAssessmentQuestion()">Começar Avaliação 🚀</button>
                </div>`;
        }

        function showAssessmentQuestion() {
            const question = assessmentQuestions[currentQuestion];
            const totalInBlock = question.block === 1 ? 10 : 5;
            const questionInBlock = question.block === 1 ? currentQuestion + 1 : currentQuestion - 9;
            const progress = 40 + ((currentQuestion + 1) / assessmentQuestions.length) * 50;
            document.getElementById('progressFill').style.width = progress + '%';

            const letters = ['A', 'B', 'C', 'D'];
            let optionsHTML = question.options.map((option, i) =>
                `<button class="quiz-option-btn" onclick="selectAssessmentOption(${i})"><div class="option-letter">${letters[i]}</div><div class="option-text">${option.text}</div></button>`
            ).join('');

            document.getElementById('screenContainer').innerHTML = `
                <div class="screen active">
                    <div style="text-align:center;margin-bottom:32px;">
                        <div class="block-indicator">Bloco ${question.block} de 2</div>
                        <div class="question-number">Pergunta ${questionInBlock} de ${totalInBlock}</div>
                    </div>
                    <h2 class="question-text">${question.question}</h2>
                    <p class="question-context">${question.context}</p>
                    <div class="options-container">${optionsHTML}</div>
                    <button class="submit-answer-btn" id="submitBtn" onclick="submitAssessmentAnswer()" disabled>Enviar Resposta →</button>
                    <div style="text-align:center;margin-top:16px;">
                        <button onclick="autoAnswerCorrect()" style="padding:12px 24px;background:linear-gradient(135deg,#10b981,#059669);color:white;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;opacity:0.7;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">⚡ Modo Teste: Auto-Responder</button>
                    </div>
                </div>`;
            selectedAnswer = null;
        }

        function autoAnswerCorrect() {
            const correctIndex = assessmentQuestions[currentQuestion].options.findIndex(opt => opt.correct);
            selectAssessmentOption(correctIndex);
            setTimeout(() => submitAssessmentAnswer(), 500);
        }

        function selectAssessmentOption(index) {
            selectedAnswer = index;
            document.querySelectorAll('.quiz-option-btn').forEach((btn, i) => btn.classList.toggle('selected', i === index));
            document.getElementById('submitBtn').disabled = false;
        }

        function submitAssessmentAnswer() {
            const question = assessmentQuestions[currentQuestion];
            const isCorrect = question.options[selectedAnswer].correct;

            // ✅ FIX: Track ALL answers (was completely missing)
            assessmentAnswers.push({
                questionId:     currentQuestion + 1,
                questionText:   question.question,
                selectedAnswer: question.options[selectedAnswer].text,
                correctAnswer:  question.options.find(opt => opt.correct).text,
                isCorrect:      isCorrect,
                block:          question.block,
                difficulty:     question.difficulty,
                answeredAt:     new Date().toISOString()
            });

            if (isCorrect) {
                const points = { 'basic': 1, 'intermediate': 2, 'advanced': 3, 'pro': 4 };
                assessmentScore += points[question.difficulty];
                if (question.block === 1) block1Correct++;
            } else {
                wrongAnswers.push({
                    questionNumber: currentQuestion + 1,
                    question: question.question,
                    difficulty: question.difficulty,
                    correctAnswer: question.options.find(opt => opt.correct).text,
                    userAnswer: question.options[selectedAnswer].text,
                    explanation: question.explanation.incorrect,
                    topic: getTopicFromQuestion(question)
                });
            }

            showAssessmentFeedback(isCorrect);
        }

        function getTopicFromQuestion(question) {
            const topics = {
                'pula nos visitantes': 'Controle de Impulsos', 'recompensar': 'Timing e Reforço',
                'late na janela': 'Latidos Territoriais', 'contracondicionamento': 'Modificação Comportamental',
                'olho de baleia': 'Linguagem Corporal', 'Premack': 'Teoria de Aprendizado',
                'guarda de recurso': 'Agressão e Recursos', 'dessensibilização': 'Protocolos de Tratamento',
                'repetições': 'Fundamentos de Treinamento', 'reforço positivo': 'Princípios Básicos',
                'learned helplessness': 'Psicologia Canina', 'DRA': 'Técnicas Avançadas',
                'marcador': 'Ferramentas de Treinamento', 'calming signals': 'Comunicação Canina', 'reativo': 'Reatividade e Manejo'
            };
            const q = question.question.toLowerCase();
            for (const [kw, topic] of Object.entries(topics)) { if (q.includes(kw.toLowerCase())) return topic; }
            return 'Comportamento Canino';
        }

        function showAssessmentFeedback(isCorrect) {
            const question = assessmentQuestions[currentQuestion];
            document.getElementById('screenContainer').innerHTML = `
                <div class="screen active feedback-screen">
                    <div class="feedback-icon">${isCorrect ? '✅' : '❌'}</div>
                    <h2 class="feedback-title ${isCorrect ? 'correct' : 'incorrect'}">${isCorrect ? 'Correto!' : 'Não Exatamente'}</h2>
                    <div class="explanation-box"><strong>💡 Explicação:</strong><p>${isCorrect ? question.explanation.correct : question.explanation.incorrect}</p></div>

                </div>`;
        }

        function nextAssessmentQuestion() {
            currentQuestion++;
            if (currentQuestion === 10) showBreakScreen();
            else if (currentQuestion >= assessmentQuestions.length) {
                wrongAnswers.length > 0 ? showGapsAnalysis() : showResults();
            } else showAssessmentQuestion();
        }

        function showBreakScreen() {
            const accuracy = Math.round((block1Correct / 10) * 100);
            document.getElementById('progressFill').style.width = String(40 + (10 / 15) * 50) + '%';
            document.getElementById('screenContainer').innerHTML = `
                <div class="screen active" style="background:linear-gradient(135deg,#f0f4ff,#e0e7ff);border-radius:24px;padding:60px;margin:20px;text-align:center;">

                        <div class="stat-box"><div class="stat-value">${block1Correct}</div><div class="stat-label">Acertos</div></div>

        function showGapsAnalysis() {
            document.getElementById('progressFill').style.width = '95%';
            const diffLabels = { 'basic': 'Básico', 'intermediate': 'Intermediário', 'advanced': 'Avançado', 'pro': 'Profissional' };

                    </div>

                        <p style="margin-top:20px;">${Array.from(new Set(wrongAnswers.map(w => w.topic))).map(t => `<span class="gap-topic" style="margin:4px;">${t}</span>`).join('')}</p>

        function showResults() {
            document.getElementById('progressFill').style.width = '100%';
            const maxScore = assessmentQuestions.reduce((sum, q) => sum + { 'basic': 1, 'intermediate': 2, 'advanced': 3, 'pro': 4 }[q.difficulty], 0);
            const percentage = (assessmentScore / maxScore) * 100;

            let level, levelClass, levelDescription, entryPoint, curriculum;
            if (percentage < 35) {
                level = 'Iniciante'; levelClass = 'iniciante';
                levelDescription = 'Você está no início da jornada. Tem compreensão básica mas se beneficiaria muito de educação fundamental estruturada.';
                entryPoint = 'Módulo 1: Fundamentos';
                curriculum = [{ icon: '📚', text: 'Começar com: Princípios Básicos de Comportamento Canino' }, { icon: '🎯', text: 'Focar em: Reforço Positivo e Timing' }, { icon: '👥', text: 'Recomendado: Aulas em grupo para iniciantes' }];
            } else if (percentage < 55) {
                level = 'Intermediário'; levelClass = 'intermediario';
                levelDescription = 'Você tem conhecimento fundamental sólido. Pronto para técnicas mais avançadas e teoria comportamental.';
                entryPoint = 'Módulo 3: Modificação de Comportamento';
                curriculum = [{ icon: '🎓', text: 'Começar com: Linguagem Corporal e Teoria de Aprendizado' }, { icon: '🧠', text: 'Focar em: Contracondicionamento e Dessensibilização' }, { icon: '💪', text: 'Praticar: Timing em cenários complexos' }];
            } else if (percentage < 75) {
                level = 'Avançado'; levelClass = 'avancado';
                levelDescription = 'Excelente conhecimento! Você entende ciência comportamental e conceitos avançados.';
                entryPoint = 'Módulo 5: Casos Complexos';
                curriculum = [{ icon: '🏆', text: 'Começar com: Modificação Avançada e Casos Complexos' }, { icon: '🔬', text: 'Focar em: Análise Aplicada do Comportamento (ABA)' }, { icon: '📊', text: 'Considerar: Certificação profissional (CPDT, KPA)' }];
            } else {
                level = 'Especialista'; levelClass = 'especialista';
                levelDescription = 'Excepcional! Você tem conhecimento de nível profissional.';
                entryPoint = 'Módulo 7: Desenvolvimento Profissional';
                curriculum = [{ icon: '⭐', text: 'Começar com: Desenvolvimento Profissional e Estudos de Caso' }, { icon: '🎯', text: 'Focar em: Consultas comportamentais avançadas' }, { icon: '👨‍🏫', text: 'Considerar: Mentoria ou ensino de outros profissionais' }];
            }

            const curriculumHTML = curriculum.map(item => `<li><span>${item.icon}</span><span>${item.text}</span></li>`).join('');

            document.getElementById('screenContainer').innerHTML = `
                <div class="screen active results-screen" style="text-align:center;">
                    <div class="avatar">🎉</div>
                    <h1 class="title">Avaliação Completa!</h1>
                    <div class="level-badge ${levelClass}">Nível ${level}</div>
                    <div class="score-display">${assessmentScore} / ${maxScore}</div>
                    <p class="score-label">${Math.round(percentage)}% de Acerto</p>
                    <div class="results-card"><h3>Seu Nível de Conhecimento</h3><p>${levelDescription}</p></div>
                    <div class="results-card"><h3>📍 Ponto de Entrada no Curso</h3><p style="font-size:18px;font-weight:600;color:#667eea;">${entryPoint}</p><p style="margin-top:12px;">Baseado no seu nível ${level.toLowerCase()} e no problema "${userData.problem}" do(a) ${userData.dogName}.</p></div>
                    <div class="results-card"><h3>Seu Currículo Personalizado</h3><ul>${curriculumHTML}</ul></div>
                    <div class="info-card" style="margin-top:24px;"><p style="color:#6b7280;text-align:center;line-height:1.6;"><strong style="color:#111827;display:block;margin-bottom:8px;">🤖 Curso Personalizado com suporte de IA</strong>Baseado no seu nível ${level.toLowerCase()}, nosso sistema criará um curso match perfeito para você e o(a) ${userData.dogName}!</p></div>
                    <button class="start-btn" onclick="finishFlow()">Continuar →</button>
                </div>`;

            // Store level and max score for later use in DB submission
            userData._assessmentLevel = level;
            userData._assessmentMaxScore = maxScore;
            userData._assessmentPercentage = Math.round(percentage);
            userData._assessmentScore = assessmentScore;
        }

        // ============================================================
        //  LEARNING PREFERENCES
        // ============================================================
        function finishFlow() { showLearningPreferences(); }

        function showLearningPreferences() {
            document.getElementById('progressFill').style.width = '100%';
            if (currentLearningStep >= learningPreferencesSteps.length) { showLearningPreferencesSummary(); return; }
            const step = learningPreferencesSteps[currentLearningStep];
            let optionsHTML = step.options.map((opt, i) =>
                `<button class="option-btn" onclick="selectLearningOption(${i})" style="padding:16px;"><div class="icon">${opt.icon}</div><div class="label">${opt.label}</div><div class="description">${opt.description}</div></button>`
            ).join('');
            document.getElementById('screenContainer').innerHTML = `
                <div class="screen active">
                    <div class="avatar">📚</div>
                    <h2 class="question">${step.question}</h2>
                    <p class="subtitle">${step.subtitle}</p>
                    <div class="button-grid" style="max-width:500px;margin:0 auto;">${optionsHTML}</div>
                    <div style="margin-top:32px;text-align:center;color:#9ca3af;font-size:14px;">Pergunta ${currentLearningStep + 1} de ${learningPreferencesSteps.length}</div>
                </div>`;
        }

        function selectLearningOption(index) {
            const step = learningPreferencesSteps[currentLearningStep];
            userData[step.id] = step.options[index].value;
            const insight = step.insight(step.options[index].value);
            document.getElementById('screenContainer').innerHTML = `
                <div class="screen active" style="text-align:center;">
                    <div class="avatar">${insight.icon}</div>
                    <h2 class="insight-title">${insight.title}</h2>
                    <p class="insight-text">${insight.text}</p>
                    ${insight.tip ? `<div class="insight-tip">💡 <strong>Dica:</strong> ${insight.tip}</div>` : ''}
                    <button class="next-btn" onclick="nextLearningStep()" style="margin-top:24px;">${currentLearningStep < learningPreferencesSteps.length - 1 ? 'Próxima Pergunta →' : 'Finalizar →'}</button>
                </div>`;
        }

        function nextLearningStep() {
            currentLearningStep++;
            if (currentLearningStep >= learningPreferencesSteps.length) showLearningPreferencesSummary();
            else showLearningPreferences();
        }

        function showLearningPreferencesSummary() {
            document.getElementById('progressFill').style.width = '100%';
            const styleLabel = { 'videos': '🎥 Vídeos', 'textos': '📖 Textos', 'hibrido': '🎯 Híbrido' };
            const schedLabel = { 'fixo': '📅 Horário Fixo', 'flexivel': '🔄 Totalmente Flexível', 'semi-flexivel': '⚖️ Semi-Flexível' };
            const daysLabel  = { 'seg-sex': '💼 Segunda a Sexta', 'fins-semana': '🎉 Finais de Semana', 'todos': '📆 Todos os Dias', 'varia': '🎲 Varia Muito' };
            const timeLabel  = { 'manha': '🌅 Manhã', 'tarde': '☀️ Tarde', 'noite': '🌙 Noite', 'madrugada': '🌃 Madrugada' };
            document.getElementById('screenContainer').innerHTML = `
                <div class="screen active">
                    <div class="avatar">✅</div>
                    <h1 class="question">Perfil Completo!</h1>
                    <p class="subtitle">Suas preferências de aprendizado foram salvas</p>
                    <div class="summary-section">
                        <h3>📚 Suas Preferências de Aprendizado</h3>
                        <div class="summary-item"><span class="summary-label">Estilo de Aprendizado:</span><span class="summary-value">${styleLabel[userData.learningStyle] || userData.learningStyle}</span></div>
                        <div class="summary-item"><span class="summary-label">Horas por Semana:</span><span class="summary-value">${userData.weeklyHours}</span></div>
                        <div class="summary-item"><span class="summary-label">Tipo de Rotina:</span><span class="summary-value">${schedLabel[userData.schedulePreference] || userData.schedulePreference}</span></div>
                        <div class="summary-item"><span class="summary-label">Dias Preferidos:</span><span class="summary-value">${daysLabel[userData.preferredDays] || userData.preferredDays}</span></div>
                        <div class="summary-item"><span class="summary-label">Período do Dia:</span><span class="summary-value">${timeLabel[userData.preferredTime] || userData.preferredTime}</span></div>
                    </div>
                    <button class="next-btn" onclick="showAppTutorial()">Ver Tutorial do App →</button>
                </div>`;
        }

        // ============================================================
        //  APP TUTORIAL
        // ============================================================
        function showAppTutorial() {
            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('screenContainer').innerHTML = `
                <div class="screen active tutorial-screen">
                    <div class="tutorial-header">
                        <div class="tutorial-icon">🎓</div>
                        <h1 class="title">Bem-vindo ao PetGenius, ${userData.ownerName}!</h1>
                        <p class="subtitle">Antes de começar, vamos conhecer o app e como navegar pelo seu curso personalizado</p>
                    </div>
                    <div class="tutorial-steps">
                        <div class="tutorial-step"><div class="tutorial-step-number">1</div><div class="tutorial-step-icon">📚</div><h3 class="tutorial-step-title">Módulos do Curso</h3><p class="tutorial-step-description">Curso dividido em módulos progressivos, cada um focado em um aspecto do treinamento.</p><ul class="tutorial-step-list"><li>Vídeo-aulas curtas e práticas</li><li>Exercícios para fazer com ${userData.dogName}</li><li>Progresso rastreado automaticamente</li></ul></div>
                        <div class="tutorial-step"><div class="tutorial-step-number">2</div><div class="tutorial-step-icon">🎯</div><h3 class="tutorial-step-title">Dashboard</h3><p class="tutorial-step-description">Acompanhe seu progresso, veja próximas aulas e conquistas desbloqueadas.</p><ul class="tutorial-step-list"><li>Visão geral do progresso</li><li>Próximas aulas recomendadas</li><li>Conquistas e badges ganhos</li></ul></div>
                        <div class="tutorial-step"><div class="tutorial-step-number">3</div><div class="tutorial-step-icon">📊</div><h3 class="tutorial-step-title">Progresso do ${userData.dogName}</h3><p class="tutorial-step-description">Registre comportamentos e veja a evolução ao longo do tempo.</p><ul class="tutorial-step-list"><li>Diário de comportamento</li><li>Gráficos de evolução</li><li>Fotos e vídeos de progresso</li></ul></div>
                        <div class="tutorial-step"><div class="tutorial-step-number">4</div><div class="tutorial-step-icon">💬</div><h3 class="tutorial-step-title">Social e Comunidade</h3><p class="tutorial-step-description">Conecte-se com outros tutores e tire dúvidas com especialistas.</p><ul class="tutorial-step-list"><li>Fórum da comunidade</li><li>Consultas com especialistas</li><li>Chat com IA 24/7</li></ul></div>
                        <div class="tutorial-step"><div class="tutorial-step-number">5</div><div class="tutorial-step-icon">🔔</div><h3 class="tutorial-step-title">Lembretes</h3><p class="tutorial-step-description">Configure lembretes para treinar ${userData.dogName} nos horários ideais.</p><ul class="tutorial-step-list"><li>Lembretes personalizados</li><li>Sugestões baseadas em rotina</li><li>Notificações motivacionais</li></ul></div>
                        <div class="tutorial-step"><div class="tutorial-step-number">6</div><div class="tutorial-step-icon">⚙️</div><h3 class="tutorial-step-title">Configurações</h3><p class="tutorial-step-description">Personalize sua experiência e gerencie informações do ${userData.dogName}.</p><ul class="tutorial-step-list"><li>Preferências de notificação</li><li>Atualizar dados do cão</li><li>Gerenciar assinatura</li></ul></div>
                    </div>
                    <div class="tutorial-preview">
                        <h3>📱 Menu Principal do App</h3>
                        <div class="menu-preview">
                            <div class="menu-item"><div class="menu-item-icon">🏠</div><div class="menu-item-content"><div class="menu-item-title">Início</div><div class="menu-item-subtitle">Dashboard e visão geral do progresso</div></div></div>
                            <div class="menu-item"><div class="menu-item-icon">📚</div><div class="menu-item-content"><div class="menu-item-title">Meus Cursos</div><div class="menu-item-subtitle">Módulos, aulas e exercícios personalizados</div></div></div>
                            <div class="menu-item"><div class="menu-item-icon">📊</div><div class="menu-item-content"><div class="menu-item-title">Progresso</div><div class="menu-item-subtitle">Evolução do ${userData.dogName} ao longo do tempo</div></div></div>
                            <div class="menu-item"><div class="menu-item-icon">🐕</div><div class="menu-item-content"><div class="menu-item-title">Fale com o Elvis</div><div class="menu-item-subtitle">Chat com IA especialista em comportamento canino</div></div></div>
                            <div class="menu-item"><div class="menu-item-icon">👥</div><div class="menu-item-content"><div class="menu-item-title">Social e Comunidade</div><div class="menu-item-subtitle">Fórum, chat com especialistas e IA</div></div></div>
                            <div class="menu-item"><div class="menu-item-icon">⚙️</div><div class="menu-item-content"><div class="menu-item-title">Configurações</div><div class="menu-item-subtitle">Perfil, notificações e preferências</div></div></div>
                        </div>
                    </div>
                    <div class="tutorial-tip">
                        <strong>💡 Dica de Ouro</strong>
                        <p>O sucesso vem da CONSISTÊNCIA, não da perfeição. Faça 10 minutos por dia com ${userData.dogName} e você verá resultados incríveis em 2-3 semanas! 🚀</p>
                    </div>
                    <button class="start-course-btn" onclick="startCourse()">🎉 Iniciar Meu Curso Personalizado</button>
                </div>`;
        }

        // ============================================================
        //  GOOGLE SHEETS SUBMISSION
        // ============================================================
        function startCourse() {
            saveToGoogleSheets({
                userData: userData,
                assessment: {
                    score:          userData._assessmentScore,
                    maxScore:       userData._assessmentMaxScore,
                    percentage:     userData._assessmentPercentage,
                    level:          userData._assessmentLevel,
                    block1Correct:  block1Correct
                }
            });
        }

        async function saveToGoogleSheets(flowData) {
            const container = document.getElementById('screenContainer');

            container.innerHTML = `
                <div class="screen active" style="text-align:center;padding:80px 40px;">
                    <div style="font-size:64px;margin-bottom:24px;">💾</div>
                    <h2 style="font-size:28px;margin-bottom:16px;">Salvando seus dados...</h2>
                    <p style="color:#6b7280;font-size:16px;">Aguarde um momento enquanto registramos suas informações</p>
                </div>`;

            // ✅ FIX: All field names now match the actual userData object
            const dataToSave = {
                userName:           userData.ownerName          || '',   // ✅ was userData.name
                userEmail:          userData.email              || '',   // ✅ graceful empty
                dogName:            userData.dogName            || '',
                dogAge:             userData.age                || '',   // ✅ was userData.dogAge
                dogBreed:           userData.breed              || '',
                dogProblem:         userData.problem            || '',
                details:            userData.details            || '',
                learningStyle:      userData.learningStyle      || 'Não informado',
                weeklyHours:        userData.weeklyHours        || 'Não informado',
                schedulePreference: userData.schedulePreference || 'Não informado',
                preferredDays:      userData.preferredDays      || 'Não informado',
                preferredTime:      userData.preferredTime      || 'Não informado',
                assessmentResults: {
                    scorePoints:       flowData.assessment.score,
                    maxPoints:         flowData.assessment.maxScore,
                    scorePercentage:   flowData.assessment.percentage,
                    level:             flowData.assessment.level,
                    block1Correct:     flowData.assessment.block1Correct,
                    wrongCount:        wrongAnswers.length,
                    recommendedCourse: `${userData.problem || 'Geral'} - ${flowData.assessment.level}`
                },
                // ✅ FIX: use assessmentAnswers (was assessmentHistory which didn't exist)
                assessmentAnswers: assessmentAnswers.map(a => ({
                    questionId:     a.questionId,
                    questionText:   a.questionText,
                    userAnswer:     a.selectedAnswer,
                    correctAnswer:  a.correctAnswer,
                    isCorrect:      a.isCorrect,
                    block:          a.block,
                    difficulty:     a.difficulty,
                    answeredAt:     a.answeredAt
                })),
                submittedAt: new Date().toISOString()
            };

            console.log('[PetGenius] Submitting to DB:', dataToSave);

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataToSave)
                });
                showSuccessScreen(flowData);
            } catch (error) {
                console.error('[PetGenius] DB Error:', error);
                container.innerHTML = `
                    <div class="screen active" style="text-align:center;padding:80px 40px;">
                        <div style="font-size:64px;margin-bottom:24px;">⚠️</div>
                        <h2 style="font-size:28px;margin-bottom:16px;color:#ef4444;">Erro ao conectar</h2>
                        <p style="color:#6b7280;font-size:16px;margin-bottom:32px;">${error.message}</p>
                        <div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
                            <button class="next-btn" onclick="startCourse()">🔄 Tentar Novamente</button>
                            <button class="next-btn" style="background:#6b7280;" onclick="showSuccessScreen(${JSON.stringify(flowData).replace(/"/g, '&quot;')})">Continuar Sem Salvar</button>
                        </div>
                        <div style="margin-top:32px;padding:20px;background:#fef3c7;border-radius:12px;text-align:left;">
                            <strong style="color:#92400e;display:block;margin-bottom:8px;">💡 Dados no console do navegador:</strong>
                            <p style="color:#78350f;font-size:14px;">Pressione F12 para ver os dados salvos localmente.</p>
                        </div>
                    </div>`;
                console.log('=== PETGENIUS DADOS ===', JSON.stringify(dataToSave, null, 2));
            }
        }

        function showSuccessScreen(flowData) {
            const { percentage, level } = flowData.assessment;
            document.getElementById('screenContainer').innerHTML = `
                <div class="screen active" style="text-align:center;padding:60px 40px;">
                    <div style="font-size:80px;margin-bottom:24px;">🎉</div>
                    <h1 style="font-size:32px;font-weight:700;margin-bottom:16px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
                        Parabéns, ${userData.ownerName}!
                    </h1>
                    <p style="font-size:18px;color:#6b7280;margin-bottom:40px;">Seu cadastro está completo e seus dados foram salvos com sucesso!</p>
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;max-width:600px;margin:0 auto 40px;">
                        <div style="background:linear-gradient(135deg,#f0f4ff,#e0e7ff);padding:24px;border-radius:16px;">
                            <div style="font-size:36px;font-weight:700;color:#667eea;margin-bottom:8px;">${percentage}%</div>
                            <div style="font-size:14px;color:#6b7280;font-weight:600;">Taxa de Acerto</div>
                        </div>
                        <div style="background:linear-gradient(135deg,#f0f4ff,#e0e7ff);padding:24px;border-radius:16px;">
                            <div style="font-size:28px;font-weight:700;color:#667eea;margin-bottom:8px;">${level}</div>
                            <div style="font-size:14px;color:#6b7280;font-weight:600;">Seu Nível</div>
                        </div>
                    </div>
                    <div style="background:#fef3c7;border-left:4px solid #f59e0b;padding:24px;border-radius:12px;text-align:left;max-width:600px;margin:0 auto 32px;">
                        <strong style="color:#92400e;display:block;margin-bottom:12px;font-size:16px;">🚀 Próximos Passos:</strong>
                        <ul style="color:#78350f;font-size:15px;line-height:1.8;padding-left:20px;">
                            <li>Seu currículo personalizado está sendo preparado</li>
                            <li>Dados salvos no Google Sheets</li>
                            <li>Em breve você receberá acesso ao dashboard</li>
                            <li>Você pode começar a treinar o(a) ${userData.dogName} já! 🐕</li>
                        </ul>
                    </div>
                    <button class="next-btn" onclick="window.open('https://docs.google.com/spreadsheets/d/1HDC9bymGRSFBcHq1jbvgSyq5_m5Wx0RMoMUrAT2L83I/edit','_blank')">
                        📊 Ver Dados Salvos no Google Sheets →
                    </button>
                    <p style="margin-top:24px;font-size:14px;color:#9ca3af;">
                        Quer começar de novo? <a href="javascript:location.reload()" style="color:#667eea;text-decoration:underline;">Reiniciar fluxo</a>
                    </p>
                </div>`;
        }
    </script>
</body>
</html>
